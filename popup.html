<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PromptFly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    :root {
      --bg: #080b0f;
      --surface: #0f1318;
      --surface2: #161c24;
      --accent: #63ffb4;
      --accent-dim: rgba(99, 255, 180, 0.15);
      --accent-border: rgba(99, 255, 180, 0.25);
      --text: #e8f0f0;
      --muted: rgba(232, 240, 240, 0.4);
      --danger: #ff6b6b;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    html { width: 380px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 500px;
      max-height: 580px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* header stuff */
    .header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(99,255,180,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .logo {
      width: 32px; 
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(99,255,180,0.3);
      animation: logo-pulse 3s ease-in-out infinite;
    }
    @keyframes logo-pulse {
      0%, 100% { box-shadow: 0 0 16px rgba(99,255,180,0.3); }
      50% { box-shadow: 0 0 24px rgba(99,255,180,0.5); }
    }
    
    .header-text h1 {
      font-size: 16px; 
      font-weight: 800; 
      letter-spacing: -0.02em;
      color: #fff; line-height: 1;
    }
    .header-text p {
      font-size: 10px; 
      color: var(--muted); margin-top: 2px;
      font-family: var(--mono); letter-spacing: 0.05em;
    }

    .count-badge {
      margin-left: auto;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 11px; 
      font-weight: 700;
      padding: 3px 8px; 
      border-radius: 20px;
    }

    /* the add form */
    .add-form {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .field-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .slash-prefix {
      font-family: var(--mono);
      font-size: 16px;
      color: var(--accent);
      font-weight: 700;
      flex-shrink: 0;
      padding-top: 1px;
    }
    input[type="text"], textarea {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 11px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent-border);
      box-shadow: 0 0 0 3px rgba(99,255,180,0.07);
    }
    input[type="text"]::placeholder, textarea::placeholder {
      color: rgba(255,255,255,0.2);
    }
    #cmd-input {
      font-weight: 700;
      letter-spacing: 0.03em;
      flex: 1;
    }
    #text-input {
      resize: none;
      height: 70px;
      font-family: var(--sans);
      font-size: 12px;
      line-height: 1.5;
    }
    .btn-add {
      background: var(--accent);
      color: #050a07;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      padding: 9px 0;
      width: 100%;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: transform 0.12s, box-shadow 0.15s, background 0.15s;
      position: relative;
      overflow: hidden;
    }
    .btn-add::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.15s;
    }
    .btn-add:hover { 
      box-shadow: 0 0 18px rgba(99,255,180,0.35); 
      transform: translateY(-1px); 
    }
    .btn-add:active { 
      transform: translateY(0); 
      box-shadow: none; 
    }
    .btn-add.saving { 
      background: #3ad494; 
    }

    /* quick search filter */
    .search-row {
      padding: 10px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .search-wrap {
      position: relative;
    }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 12px; pointer-events: none;
    }
    #search-input {
      padding-left: 28px;
      background: var(--surface);
      border-color: rgba(255,255,255,0.06);
    }

    /* command list container */
    .list-area {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(99,255,180,0.2) transparent;
    }
    .list-area::-webkit-scrollbar { width: 4px; }
    .list-area::-webkit-scrollbar-thumb { 
      background: rgba(99,255,180,0.2); 
      border-radius: 4px; 
    }

    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: var(--muted);
    }
    .empty-state .emoji { font-size: 28px; margin-bottom: 8px; }
    .empty-state p { font-size: 12px; line-height: 1.6; }
    .empty-state code { color: var(--accent); font-family: var(--mono); font-size: 11px; }

    .cmd-card {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.12s;
      animation: card-in 0.2s cubic-bezier(0.34, 1.3, 0.64, 1) both;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .cmd-card:hover { background: rgba(255,255,255,0.025); }
    
    .cmd-key {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
      min-width: 90px;
      padding-top: 2px;
      flex-shrink: 0;
    }
    .cmd-key::before { content: '/'; opacity: 0.6; }
    
    .cmd-body {
      flex: 1;
      min-width: 0;
    }
    
    .cmd-preview {
      font-size: 11px;
      color: var(--muted);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      line-height: 1.4;
      font-family: var(--sans);
    }
    
    .cmd-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }
    
    .cmd-card:hover .cmd-actions { opacity: 1; }
    
    .icon-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      transition: all 0.12s;
    }
    .icon-btn:hover.edit { 
      color: #fff; 
      border-color: rgba(255,255,255,0.3); 
      background: rgba(255,255,255,0.05); 
    }
    .icon-btn:hover.del { 
      color: var(--danger); 
      border-color: rgba(255,107,107,0.4); 
      background: rgba(255,107,107,0.08); 
    }
    .icon-btn.copied { 
      color: var(--accent); 
      border-color: var(--accent-border); 
    }

    /* popup footer */
    .footer {
      padding: 8px 18px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-hint {
      font-size: 9px;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: 0.06em;
    }
    .footer-hint span { color: var(--accent); }
    .clear-btn {
      background: transparent;
      border: none;
      font-size: 9px;
      color: rgba(255,107,107,0.4);
      cursor: pointer;
      font-family: var(--mono);
      letter-spacing: 0.06em;
      transition: color 0.15s;
    }
    .clear-btn:hover { color: var(--danger); }

    /* edit overlay modal */
    .edit-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      flex-direction: column;
      padding: 18px;
      gap: 12px;
      animation: overlay-in 0.18s ease;
      display: none;
    }
    @keyframes overlay-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .edit-overlay h2 {
      font-size: 14px; 
      font-weight: 700; 
      color: var(--accent);
    }
    .edit-overlay label {
      font-size: 11px; color: var(--muted); margin-bottom: 4px; display: block;
      font-family: var(--mono); letter-spacing: 0.08em; text-transform: uppercase;
    }
    #edit-text {
      height: 120px;
    }
    .edit-actions { 
      display: flex; 
      gap: 8px; 
      margin-top: auto; 
    }
    .btn-cancel {
      flex: 1; 
      background: var(--surface2); 
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted); 
      border-radius: 8px; 
      padding: 9px; 
      cursor: pointer;
      font-family: var(--sans); 
      font-size: 12px; 
      font-weight: 600;
      transition: all 0.15s;
    }
    .btn-cancel:hover { color: var(--text); }
    
    .btn-save {
      flex: 2; 
      background: var(--accent); 
      color: #050a07; 
      border: none;
      border-radius: 8px; 
      padding: 9px; 
      cursor: pointer;
      font-family: var(--sans); 
      font-size: 13px; 
      font-weight: 700;
      transition: all 0.15s;
    }
    .btn-save:hover { box-shadow: 0 0 14px rgba(99,255,180,0.3); }

    .wrapper { 
      position: relative; 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
    }
  </style>
</head>
<body>
  
  <div class="header">
    <div class="logo">🪁</div>
    <div class="header-text">
      <h1>PromptFly</h1>
      <p>slash command injector</p>
    </div>
    <div class="count-badge" id="count-badge">0 cmds</div>
  </div>

  <div class="wrapper">
    <!-- inputs -->
    <div class="add-form">
      <div class="field-row">
        <span class="slash-prefix">/</span>
        <input type="text" id="cmd-input" placeholder="command-name" maxlength="40" autocomplete="off" spellcheck="false">
      </div>
      <textarea id="text-input" placeholder="The full text this command expands to..."></textarea>
      <button class="btn-add" id="add-btn">＋ Save Command</button>
    </div>

    <!-- lookup -->
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" placeholder="Filter commands..." autocomplete="off">
      </div>
    </div>

    <div class="list-area" id="list-area">
      <div class="empty-state" id="empty-state">
        <div class="emoji">✦</div>
        <p>No commands yet.<br>Add one above, then type<br><code>/command-name</code> anywhere.</p>
      </div>
    </div>

    <div class="edit-overlay" id="edit-overlay">
      <h2>Edit Command</h2>
      <div>
        <label>Command Name</label>
        <div class="field-row">
          <span class="slash-prefix">/</span>
          <!-- hacky way to prevent editing the name -->
          <input type="text" id="edit-key" readonly style="opacity:0.5; cursor:not-allowed; flex:1">
        </div>
      </div>
      <div>
        <label>Expansion string</label>
        <textarea id="edit-text"></textarea>
      </div>
      <div class="edit-actions">
        <button class="btn-cancel" id="cancel-edit">Cancel</button>
        <button class="btn-save" id="save-edit">Save Changes</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-hint">Tab or Enter to <span>expand</span> · Esc to dismiss</span>
    <button class="clear-btn" id="clear-btn">clear all</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
